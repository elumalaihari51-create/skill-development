<!DOCTYPE html>
<html>
<head>
<style>
button {
  background-color: blue;
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
  transition: background-color 0.5s ease;
}

button:hover {
  background-color: red;
}
</style>
</head>
<body>

<button>Hover Me</button>

</body>
</html>
