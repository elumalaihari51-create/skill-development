<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Table Headers</title>
    <style>
        table, th, td {
            /* FIX: Use a solid or dashed border and collapse them for a cleaner look */
            border: 1px dashed blueviolet;
            border-collapse: collapse; 
            padding: 10px;
        }
        
        /* Note: border-radius doesn't work on table cells unless 
           border-collapse is set to 'separate' */
        th, td {
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <table>
        <tr style="height: 50px;">
            <th>Bike</th>
            <td>Car</td>
            <td>Bicycle</td>
        </tr>
        <tr>
            <th>KTM</th>
            <td>Audi</td>
            <td>Hero</td>
        </tr>
        <tr>
            <th>Pulsar</th>
            <td>Mercedes</td>
            <td>Atlas</td>
        </tr>
    </table>

</body>
</html>
